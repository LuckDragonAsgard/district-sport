<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0D9488">
<title>WPS Timing</title>
<!-- WPS Athletics Timing v3 - 2026-04-11
     Phone-first crowd-sourced lane timing. Any number of timers per lane,
     trimmed-mean averaging, Firebase server-clock sync, tier-aware timer-floor
     (1/2/3 timers per lane by level), auto-flow into results/ (same tree the
     scoring app reads - zero manual re-entry). Multi-carnival support via
     ?carnival=xxx URL param with isolated DB namespace per carnival. QR code
     + short join code on the Join Page so parents scan-in instead of typing.
     Publish preview + split validation + audit log for zero-margin-of-error
     reliability. -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
:root{
  --bg:#0F172A; --card:#1E293B; --card2:#334155; --ink:#F8FAFC; --sub:#94A3B8;
  --accent:#0D9488; --accent2:#14B8A6; --warn:#F59E0B; --bad:#DC2626; --good:#16A34A;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;min-height:100vh}
body{padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#app{max-width:560px;margin:0 auto;padding:14px 14px 80px}
h1,h2,h3{margin:0 0 10px;letter-spacing:.2px}
h1{font-size:22px}
.muted{color:var(--sub);font-size:12px}
.card{background:var(--card);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid #334155}
.row{display:flex;gap:8px;align-items:center}
.row>*{min-width:0}
.grow{flex:1}
button{font-family:inherit;font-size:15px;font-weight:700;border:none;border-radius:10px;padding:12px 16px;background:var(--card2);color:var(--ink);cursor:pointer;transition:transform .05s}
button:active{transform:scale(.97)}
button.primary{background:var(--accent);color:#fff}
button.ghost{background:transparent;border:1.5px solid #475569;color:#CBD5E1}
button.warn{background:var(--warn);color:#1F2937}
button.bad{background:var(--bad);color:#fff}
button.good{background:var(--good);color:#fff}
button:disabled{opacity:.45;cursor:not-allowed}
input,select{font:inherit;background:#0B1220;color:var(--ink);border:1.5px solid #334155;border-radius:10px;padding:10px 12px;width:100%}
select{appearance:none}
label{display:block;font-size:11px;text-transform:uppercase;color:var(--sub);margin-bottom:4px;letter-spacing:.5px;font-weight:700}

.conn-dot{position:fixed;top:12px;right:12px;width:10px;height:10px;border-radius:50%;background:#475569;box-shadow:0 0 0 2px #0F172A;z-index:50;transition:background .2s}
.conn-dot.ok{background:#10B981}

.lanes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.lane-btn{height:96px;border-radius:14px;background:var(--card2);color:#fff;font-size:36px;font-weight:900;display:flex;align-items:center;justify-content:center;position:relative;border:2px solid #475569;text-decoration:none}
.lane-btn .sub{position:absolute;bottom:6px;font-size:10px;font-weight:700;opacity:.75;letter-spacing:.5px;text-transform:uppercase}
.lane-btn.assigned{background:linear-gradient(145deg,#0D9488,#0F766E);border-color:#14B8A6}
.lane-btn.taken{opacity:.55}

.big-lane{font-size:48px;font-weight:900;letter-spacing:-1px;background:linear-gradient(145deg,#0D9488,#0F766E);-webkit-background-clip:text;background-clip:text;color:transparent}
.student-card{padding:18px;border-radius:14px;text-align:center;margin-bottom:14px;border:2px solid transparent}
.student-name{font-size:22px;font-weight:900;margin-bottom:4px}
.house-chip{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;letter-spacing:.5px}

.state-banner{padding:12px;border-radius:10px;text-align:center;font-weight:800;margin-bottom:14px;font-size:13px;letter-spacing:.5px;text-transform:uppercase}
.state-waiting{background:#1E293B;color:#94A3B8}
.state-armed{background:#F59E0B;color:#1F2937;animation:armPulse 1.2s ease-in-out infinite}
.state-running{background:#16A34A;color:#fff}
.state-stopped{background:#0F172A;color:#94A3B8;border:1.5px solid #475569}
@keyframes armPulse{0%,100%{opacity:1}50%{opacity:.55}}

.clock{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:72px;font-weight:900;text-align:center;letter-spacing:-3px;padding:18px 6px;border-radius:14px;background:#0B1220;margin-bottom:14px;border:2px solid #334155}
.clock.live{color:#10B981;border-color:#10B981}
.clock.stopped{color:#F8FAFC;border-color:#475569}

.stop-btn{width:100%;min-height:160px;font-size:42px;font-weight:900;background:var(--bad);color:#fff;border-radius:18px;border:3px solid #991B1B;letter-spacing:2px;text-transform:uppercase;box-shadow:0 8px 0 #991B1B,0 12px 20px rgba(220,38,38,.35)}
.stop-btn:active{box-shadow:0 2px 0 #991B1B,0 4px 10px rgba(220,38,38,.35);transform:translateY(6px)}
.stop-btn:disabled{background:#334155;color:#64748B;border-color:#1E293B;box-shadow:none;transform:none}

.splits-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.split-chip{background:#0B1220;border:1px solid #334155;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700;font-family:ui-monospace,monospace}
.split-chip.mine{background:#0D9488;border-color:#14B8A6;color:#fff}

.admin-lane{background:#0B1220;border:1.5px solid #334155;border-radius:10px;padding:10px;margin-bottom:8px}
.admin-lane.warn{border-color:var(--warn)}
.admin-lane.ok{border-color:var(--good)}
.admin-lane h4{margin:0 0 4px;font-size:13px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.lane-num{display:inline-flex;width:24px;height:24px;border-radius:6px;background:#0D9488;color:#fff;font-size:12px;align-items:center;justify-content:center;font-weight:900}
.mean-big{font-family:ui-monospace,monospace;font-size:22px;font-weight:900;color:#10B981}
.mean-na{color:#64748B;font-size:14px;font-weight:700}

.link{color:#5EEAD4;text-decoration:none}
.nav-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.nav-tabs a{padding:8px 12px;background:#1E293B;border:1px solid #334155;border-radius:999px;color:#CBD5E1;text-decoration:none;font-size:12px;font-weight:700}
.nav-tabs a.active{background:#0D9488;color:#fff;border-color:#14B8A6}

.footer-note{color:var(--sub);font-size:11px;text-align:center;margin-top:20px;line-height:1.5}

.countdown{position:fixed;inset:0;background:rgba(15,23,42,.95);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.countdown-num{font-size:260px;font-weight:900;color:#F59E0B;text-shadow:0 0 40px rgba(245,158,11,.6)}
.countdown-num.go{color:#10B981;text-shadow:0 0 60px rgba(16,185,129,.7);font-size:220px;letter-spacing:4px}

.conf{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase}
.conf-high{background:#064E3B;color:#6EE7B7;border:1px solid #10B981}
.conf-med{background:#422006;color:#FDBA74;border:1px solid #F59E0B}
.conf-low{background:#450A0A;color:#FCA5A5;border:1px solid #DC2626}
.conf-none{background:#1E293B;color:#64748B;border:1px solid #334155}

.observer-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.observer-lane{background:#0B1220;border:1.5px solid #334155;border-radius:10px;padding:10px;min-height:88px}
.observer-lane.leader{border-color:#F59E0B;background:linear-gradient(145deg,#422006,#0B1220)}
.observer-lane .lane-n{font-size:28px;font-weight:900;color:#5EEAD4;line-height:1}
.observer-lane .stu{font-size:12px;font-weight:700;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.observer-lane .tm{font-family:ui-monospace,monospace;font-size:17px;font-weight:900;margin-top:4px}
.observer-lane .tm.pending{color:#64748B}
.observer-lane .tm.live{color:#10B981}

.join-code{font-family:ui-monospace,monospace;font-size:72px;font-weight:900;letter-spacing:16px;color:#F59E0B;margin:10px 0;text-shadow:0 0 20px rgba(245,158,11,.3);text-align:center}
</style>
</head>

  const raw = q.get('carnival');

})();

// Deterministic 4-letter join code from carnival id
function carnivalJoinCode(id){
  let h = 0;
  for(let i=0;i<id.length;i++){ h = ((h<<5) - h + id.charCodeAt(i))|0; }
  const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  let out = '';
  for(let i=0;i<4;i++){ out += letters[Math.abs(h>>(i*5)) % letters.length]; }
  return out;
}

// Helpers (mirror index.html so keys line up)
function fbEncode(k){ return k.replace(/\./g,'__DOT__').replace(/\//g,'__SL__').replace(/\[/g,'__LB__').replace(/\]/g,'__RB__').replace(/#/g,'__HASH__').replace(/\$/g,'__DOLLAR__'); }
function mk(a,g,e){ return a+'|'+g+'|'+e; }
function fbKey(a,g,e){ return fbEncode(mk(a,g,e)); }
function escHtml(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtClock(ms){
  if(ms==null||isNaN(ms)||ms<0) ms=0;
  const cs = Math.floor(ms/10);
  const mm = Math.floor(cs/6000);
  const rest = cs - mm*6000;
  const ss = Math.floor(rest/100);
  const cc = rest - ss*100;
  return (mm>0 ? mm+':' : '') + String(ss).padStart(mm>0?2:1,'0') + '.' + String(cc).padStart(2,'0');
}
function fmtSec(ms){ if(ms==null||isNaN(ms)) return '-'; return (ms/1000).toFixed(2); }

// Trimmed mean: 3+ -> drop min+max avg rest, else plain mean
function trimmedMean(values){
  const arr = values.filter(v => typeof v === 'number' && !isNaN(v) && v > 0);
  if(!arr.length) return null;
  if(arr.length<=2) return arr.reduce((a,b)=>a+b,0)/arr.length;
  const sorted = [...arr].sort((a,b)=>a-b);
  const trimmed = sorted.slice(1,-1);
  return trimmed.reduce((a,b)=>a+b,0)/trimmed.length;
}
function laneMean(splits){
  if(!splits || typeof splits !== 'object') return null;
  const vals = Object.values(splits).map(s => s && s.elapsedMs).filter(v => typeof v === 'number' && v > 0);
  return trimmedMean(vals);
}
function buildRankedFromRace(race){
  if(!race || !race.lanes) return [];
  const rows = [];
  for(let i=1;i<=LANE_COUNT;i++){
    const lane = race.lanes[i];
    if(!lane || !lane.name) continue;
    const splits = (race.splits && race.splits[i]) || null;
    const meanMs = laneMean(splits);
    if(meanMs==null) continue;
    rows.push({name:lane.name, house:lane.house, result:+(meanMs/1000).toFixed(2), _lane:i});
  }
  rows.sort((a,b) => a.result - b.result || (a.name||'').localeCompare(b.name||''));
  return rows.map((r,i) => ({name:r.name, house:r.house, result:r.result, place:i+1}));
}
function checkTierFloor(race){
  const tier = TIMING_TIERS[race && race.tier] || TIMING_TIERS.willy;
  const need = tier.min;
  const under = [];
  for(let i=1;i<=LANE_COUNT;i++){
    const lane = race.lanes && race.lanes[i];
    if(!lane || !lane.name) continue;
    const splits = (race.splits && race.splits[i]) || {};
    const got = Object.keys(splits).length;
    if(got < need) under.push({lane:i, got, need, name:lane.name});
  }
  return {ok: under.length === 0, need, under, tierLabel: tier.label};
}
function confidenceFor(splits, tierMin){
  const count = splits ? Object.keys(splits).length : 0;
  if(count === 0) return {cls:'conf-none', label:'NO TIMERS'};
  const vals = Object.values(splits).map(s => s && s.elapsedMs).filter(v => typeof v === 'number' && v > 0);
  if(vals.length === 0) return {cls:'conf-none', label:'NO DATA'};
  const spread = vals.length > 1 ? (Math.max(...vals) - Math.min(...vals)) : 0;
  if(count >= 3 && spread < 500)  return {cls:'conf-high', label:'HIGH ' + count + ' timers'};
  if(count >= 3 && spread < 1500) return {cls:'conf-med',  label:'OK ' + count + ' ' + (spread/1000).toFixed(2) + 's'};
  if(count >= 2 && spread < 1000) return {cls:'conf-high', label:'OK ' + count + ' timers'};
  if(count >= 2 && spread < 2000) return {cls:'conf-med',  label:'CHECK ' + (spread/1000).toFixed(2) + 's'};
  if(count >= 2) return {cls:'conf-low', label:'DISAGREE ' + (spread/1000).toFixed(2) + 's'};
  return {cls:'conf-low', label:'1 TIMER ONLY'};
}

async function acquireWakeLock(){
  try{
    if('wakeLock' in navigator && !wakeLockSentinel){
      wakeLockSentinel = await navigator.wakeLock.request('screen');
      wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
    }
  }catch(e){}
}
async function releaseWakeLock(){
  if(wakeLockSentinel){ try{ await wakeLockSentinel.release(); }catch(e){} wakeLockSentinel = null; }
}
document.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'visible' && currentRace && (currentRace.state === 'armed' || currentRace.state === 'running')){
    acquireWakeLock();
  }
});

function buzz(pattern){ if(navigator.vibrate){ try{ navigator.vibrate(pattern); }catch(e){} } }

function playCountdown(onDone){
  countdownActive = true;
  const overlay = document.createElement('div');
  overlay.className = 'countdown';
  overlay.innerHTML = '<div class="countdown-num">3</div>';
  document.body.appendChild(overlay);
  buzz([60]);
  const seq = ['2','1','GO'];
  let idx = 0;
  const step = () => {
    if(idx >= seq.length){ overlay.remove(); countdownActive = false; if(onDone) onDone(); return; }
    const val = seq[idx++];
    const isGo = val === 'GO';
    overlay.innerHTML = '<div class="countdown-num' + (isGo?' go':'') + '">' + val + '</div>';
    buzz(isGo ? [200] : [60]);
    setTimeout(step, 900);
  };
  setTimeout(step, 900);
}

  if(dot) dot.classList.toggle('ok', !!s.val());
});

TIMING_REF.on('value', s => {
  const prev = currentRace;
  currentRace = s.val() || null;
  const prevStart = prev && prev.startedAtServer;
  const nowStart = currentRace && currentRace.startedAtServer;
  const freshGo = !prevStart && nowStart && currentRace.state === 'running';
  if(freshGo && (laneParam || isObserver) && !isAdmin){
    playCountdown(() => { render(); });
  }
  if(currentRace && (currentRace.state === 'armed' || currentRace.state === 'running')){
    acquireWakeLock();
  } else {
    releaseWakeLock();
  }
  if(currentRace && currentRace.state === 'published' && currentRace.event){
    rememberRace(currentRace);
  }
  if(!countdownActive) render();
}, err => {
  appEl.innerHTML = '<div class="card" style="border-color:#DC2626"><strong>DB error:</strong> ' + escHtml(err.message || err.code || 'unknown') + '</div>';
});

function carnivalQs(){ return CARNIVAL_ID !== DEFAULT_CARNIVAL ? ('?carnival=' + encodeURIComponent(CARNIVAL_ID)) : ''; }
function carnivalAmp(){ return CARNIVAL_ID !== DEFAULT_CARNIVAL ? ('&carnival=' + encodeURIComponent(CARNIVAL_ID)) : ''; }

function render(){
  if(rafHandle){ cancelAnimationFrame(rafHandle); rafHandle=null; }
  if(isJoin) return renderJoin();
  if(isAdmin) return renderAdmin();
  if(isObserver) return renderObserver();
  if(laneParam) return renderTimer(parseInt(laneParam,10));
  return renderLanePicker();
}

// VIEW: LANE PICKER
function renderLanePicker(){
  const race = currentRace;
  const eventLine = race && race.event ? escHtml(race.age + ' ' + race.gender + ' ' + race.event) : '<span class="muted">No race armed yet</span>';
  const tierLine = race && race.tier ? '<span class="muted">' + escHtml((TIMING_TIERS[race.tier]||{}).label||race.tier) + ' min ' + ((TIMING_TIERS[race.tier]||{}).min||1) + ' timer(s)/lane</span>' : '';

  let lanesHtml = '';
  for(let i=1;i<=LANE_COUNT;i++){
    const assigned = race && race.lanes && race.lanes[i];
    const splits = race && race.splits && race.splits[i] ? Object.keys(race.splits[i]) : [];
    const taken = splits.includes(timerId);
    const cls = 'lane-btn' + (assigned ? ' assigned' : '') + (taken ? ' taken' : '');
    const sub = assigned ? escHtml(assigned.name) : 'empty';
    lanesHtml += '<a href="?lane=' + i + carnivalAmp() + '" class="' + cls + '">' + i + '<div class="sub">' + sub + (taken?' done':'') + '</div></a>';
  }

  appEl.innerHTML =
    '<h1>WPS Lane Timer</h1>' +
    '<div class="muted" style="margin-bottom:10px">Carnival: <strong style="color:#5EEAD4">' + escHtml(CARNIVAL_ID) + '</strong> - code <strong style="color:#F59E0B;font-family:ui-monospace,monospace">' + JOIN_CODE + '</strong></div>' +
    '<div class="card"><label>Current race</label><div style="font-size:16px;font-weight:800;margin-bottom:4px">' + eventLine + '</div>' + tierLine + '</div>' +
    '<div class="card"><label>Your timer name</label><input type="text" placeholder="e.g. Paddy G" value="' + escHtml(timerName) + '" oninput="saveTimerName(this.value)"></div>' +
    '<div class="lanes-grid">' + lanesHtml + '</div>' +
    '<div class="footer-note"><a class="link" href="?admin=1' + carnivalAmp() + '">Race Control (admin)</a> - <a class="link" href="?observer=1' + carnivalAmp() + '">Observer</a> - <a class="link" href="?join=1' + carnivalAmp() + '">Join Page</a></div>';
}
function saveTimerName(v){
  timerName = v.trim();
  try { localStorage.setItem('wps_timing_name', timerName); } catch(e){}
}
window.saveTimerName = saveTimerName;

// VIEW: TIMER
function renderTimer(lane){
  if(!(lane>=1 && lane<=LANE_COUNT)){
    appEl.innerHTML = '<div class="card">Invalid lane. <a class="link" href="./timing.html' + carnivalQs() + '">Pick a lane</a></div>';
    return;
  }
  const race = currentRace;
  const laneInfo = race && race.lanes && race.lanes[lane];
  const student = laneInfo ? laneInfo.name : '-';
  const house   = laneInfo ? laneInfo.house : null;
  const houseColor = house ? (HCOL[house] || '#475569') : '#334155';

  const started = race && race.state === 'running' && race.startedAtServer;
  const ourSplit = race && race.splits && race.splits[lane] && race.splits[lane][timerId];
  const allSplits = race && race.splits && race.splits[lane] ? Object.entries(race.splits[lane]) : [];

  let stateHtml = '';
  if(!race){ stateHtml = '<div class="state-banner state-waiting">waiting for race control</div>'; }
  else if(race.state === 'armed'){ stateHtml = '<div class="state-banner state-armed">armed - get ready, wait for GO</div>'; }
  else if(race.state === 'running' && !ourSplit){ stateHtml = '<div class="state-banner state-running">RUNNING - tap STOP when runner crosses</div>'; }
  else if(ourSplit){ stateHtml = '<div class="state-banner state-stopped">your split recorded - waiting for next race</div>'; }
  else if(race.state === 'published'){ stateHtml = '<div class="state-banner state-stopped">race published - waiting for next race</div>'; }
  else { stateHtml = '<div class="state-banner state-waiting">waiting</div>'; }

  const eventLine = race && race.event ? '<div class="muted" style="text-align:center;margin-bottom:6px">' + escHtml(race.age + ' - ' + race.gender + ' - ' + race.event) + '</div>' : '';

  const nameInputHtml = timerName ? '' : '<div class="card"><label>Your timer name</label><input type="text" placeholder="e.g. Paddy G" oninput="saveTimerName(this.value);" value="' + escHtml(timerName) + '"></div>';

  appEl.innerHTML =
    '<div class="row" style="margin-bottom:8px"><a class="link" href="./timing.html' + carnivalQs() + '">back</a><div class="grow"></div><span class="muted">' + escHtml(timerName || 'set your name') + '</span></div>' +
    '<div style="text-align:center;margin-bottom:10px"><div class="big-lane">LANE ' + lane + '</div></div>' +
    eventLine +
    '<div class="student-card" style="background:' + houseColor + '20;border-color:' + houseColor + '"><div class="student-name">' + escHtml(student) + '</div>' + (house ? '<span class="house-chip" style="background:' + houseColor + ';color:#fff">' + escHtml(house) + '</span>' : '') + '</div>' +
    stateHtml +
    '<div id="clockBox" class="clock ' + (started && !ourSplit ? 'live' : 'stopped') + '">' + (ourSplit ? fmtClock(ourSplit.elapsedMs) : fmtClock(0)) + '</div>' +
    '<button id="stopBtn" class="stop-btn" ' + ((!started || ourSplit) ? 'disabled' : '') + '>' + (ourSplit ? 'STOPPED' : 'STOP') + '</button>' +
    '<div class="splits-row">' + (allSplits.length ? allSplits.map(([tid,sp]) => {
      const mine = tid === timerId;
      return '<span class="split-chip' + (mine?' mine':'') + '">' + escHtml(sp.name || '?') + ': ' + fmtSec(sp.elapsedMs) + '</span>';
    }).join('') : '') + '</div>' +
    nameInputHtml +
    '<div class="footer-note">Server sync - offset ' + (serverOffset>=0?'+':'') + serverOffset + 'ms</div>';

  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn){ stopBtn.addEventListener('click', () => stopClicked(lane)); }

  if(started && !ourSplit){
    const startMs = race.startedAtServer;
    const tick = () => {
      const el = document.getElementById('clockBox');
      if(!el) return;
      el.textContent = fmtClock(serverNow() - startMs);
      rafHandle = requestAnimationFrame(tick);
    };
    tick();
  }
}

function stopClicked(lane){
  if(!currentRace || currentRace.state !== 'running' || !currentRace.startedAtServer){ return; }
  if(!timerName){ alert('Please enter your timer name first.'); return; }
  const stopAtServer = serverNow();
  const elapsedMs = Math.max(0, stopAtServer - currentRace.startedAtServer);
  // Split validation: reject impossible values
  if(elapsedMs < 500){ alert('Too fast to be real (<0.5s). Ignored.'); return; }
  if(elapsedMs > 3600000){ alert('Over 1 hour - that cannot be right. Ignored.'); return; }
  const el = document.getElementById('clockBox');
  if(el){ el.textContent = fmtClock(elapsedMs); el.classList.remove('live'); el.classList.add('stopped'); }
  const btn = document.getElementById('stopBtn');
  if(btn){ btn.disabled = true; btn.textContent = 'STOPPED'; }
  if(rafHandle){ cancelAnimationFrame(rafHandle); rafHandle = null; }
  buzz([80,50,80]);
  TIMING_REF.child('splits').child(String(lane)).child(timerId).set({
    name: timerName,
    elapsedMs: elapsedMs,
    stopAt: firebase.database.ServerValue.TIMESTAMP
  }).catch(err => alert('Failed to save split: ' + (err && err.message || err)));
}

    '<div class="footer-note">Server offset ' + (serverOffset>=0?'+':'') + serverOffset + 'ms - Timer id ' + escHtml(timerId) + ' - Carnival ' + escHtml(CARNIVAL_ID) + '</div>';

  if(race.state === 'running' && race.startedAtServer){
    const tick = () => {
      const el = document.getElementById('admClock');
      if(!el) return;
      el.textContent = fmtClock(serverNow() - race.startedAtServer);

// Admin actions
function armRace(){
  const age = document.getElementById('admAge').value;
  const gender = document.getElementById('admGender').value;
  const event = document.getElementById('admEvent').value;
  const tier = document.getElementById('admTier').value;
  const prev = (currentRace && currentRace.lanes) || {};
  const lanes = {};
  for(let i=1;i<=LANE_COUNT;i++){ if(prev[i]) lanes[i] = prev[i]; }
  const raceId = 'r_' + Date.now().toString(36);
  TIMING_REF.set({raceId, age, gender, event, tier, state:'armed', startedAtServer:null, publishedAt:null, lanes, splits:null});
}
function goRace(){
  if(!currentRace || currentRace.state !== 'armed'){ return; }
  TIMING_REF.update({state:'running', startedAtServer: firebase.database.ServerValue.TIMESTAMP});
}
function clearSplits(){ TIMING_REF.child('splits').remove(); }
function abandonRace(){
  if(!confirm('Abandon current race? Lane assignments and splits will be wiped.')) return;
  TIMING_REF.remove();
}
function assignLane(lane, val){
  if(!val){ TIMING_REF.child('lanes').child(String(lane)).remove(); return; }
  const [name, house] = val.split('|');
  TIMING_REF.child('lanes').child(String(lane)).set({name, house});
}
function reuseLastRace(){
  if(!lastRaceSnapshot) return;
  const snap = lastRaceSnapshot;
  const raceId = 'r_' + Date.now().toString(36);
  TIMING_REF.set({raceId, age:snap.age, gender:snap.gender, event:snap.event, tier:snap.tier||'willy', state:'armed', startedAtServer:null, publishedAt:null, lanes:snap.lanes||{}, splits:null});
}

function previewPublish(){
  const race = currentRace;
  if(!race || !race.age){ alert('No race to publish.'); return; }
  // Validate splits
  const validated = JSON.parse(JSON.stringify(race));
  const rejects = [];
  if(validated.splits){
    for(const laneN of Object.keys(validated.splits)){
      for(const tid of Object.keys(validated.splits[laneN])){
        const sp = validated.splits[laneN][tid];
        if(!sp || typeof sp.elapsedMs !== 'number' || sp.elapsedMs < 500 || sp.elapsedMs > 3600000){
          rejects.push({lane:laneN, name:sp&&sp.name, ms:sp&&sp.elapsedMs});
          delete validated.splits[laneN][tid];
        }
      }
    }
  }
  const ranked = buildRankedFromRace(validated);
  if(!ranked.length){ alert('No lane has any VALID splits yet - nothing to publish.'); return; }
  const floor = checkTierFloor(validated);
  const fk = fbKey(race.age, race.gender, race.event);

  let rows = '';
  for(const r of ranked){
    rows += '<tr style="border-top:1px solid #334155"><td style="padding:6px;font-weight:800">' + r.place + '</td><td style="padding:6px">' + escHtml(r.name) + '</td><td style="padding:6px"><span class="house-chip" style="background:' + (HCOL[r.house]||'#475569') + ';color:#fff">' + escHtml(r.house||'') + '</span></td><td style="padding:6px;text-align:right;font-family:ui-monospace,monospace;font-weight:900;color:#10B981">' + r.result.toFixed(2) + 's</td></tr>';
  }

  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,23,42,.92);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px';
  overlay.innerHTML =
    '<div style="background:#1E293B;border:2px solid #0D9488;border-radius:16px;padding:20px;max-width:520px;width:100%;max-height:90vh;overflow:auto">' +
      '<h2 style="margin:0 0 4px">Confirm Publish</h2>' +
      '<div class="muted" style="margin-bottom:10px">' + escHtml(CARN_ROOT) + '/results/<span style="color:#5EEAD4">' + escHtml(fk) + '</span></div>' +
      (!floor.ok ? '<div style="background:#78350F;color:#FDE68A;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:10px">' + floor.under.length + ' lane(s) under the ' + floor.tierLabel + ' floor</div>':'') +
      (rejects.length ? '<div style="background:#450A0A;color:#FCA5A5;padding:8px 10px;border-radius:8px;font-size:12px;font-weight:700;margin-bottom:10px">' + rejects.length + ' invalid split(s) rejected</div>':'') +
      '<table style="width:100%;border-collapse:collapse;font-size:13px;margin-bottom:12px"><thead><tr style="background:#0B1220"><th style="padding:6px;text-align:left">#</th><th style="padding:6px;text-align:left">Name</th><th style="padding:6px;text-align:left">House</th><th style="padding:6px;text-align:right">Time</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '<div class="row" style="gap:8px">' +
        '<button class="ghost grow" id="cancelPublishBtn">Cancel</button>' +
        '<button class="primary grow" id="confirmPublishBtn">Publish ' + ranked.length + ' place(s)</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(overlay);
  document.getElementById('cancelPublishBtn').onclick = () => overlay.remove();
  document.getElementById('confirmPublishBtn').onclick = () => {
    overlay.remove();
    doPublish(race, ranked, fk, floor, rejects);
  };
}
function doPublish(race, ranked, fk, floor, rejects){
  RESULTS_REF.child(fk).set(ranked)
    .then(() => TIMING_REF.update({state:'published', publishedAt: firebase.database.ServerValue.TIMESTAMP}))
    .then(() => AUDIT_REF.push({
      publishedAt: firebase.database.ServerValue.TIMESTAMP,
      raceId: race.raceId || null,
      eventKey: fk,
      age: race.age, gender: race.gender, event: race.event, tier: race.tier,
      ranked: ranked,
      timerId: timerId,
      timerName: timerName || null,
      tierOk: floor.ok,
      rejectedSplits: rejects.length
    }))
    .then(() => alert('Published ' + ranked.length + ' place(s) to results + audit log.'))
    .catch(err => alert('Publish failed: ' + (err && err.message || err)));
}

window.assignLane = assignLane;
window.previewPublish = previewPublish;

// VIEW: OBSERVER
function renderObserver(){
  const race = currentRace || {};
  const started = race.state === 'running' && race.startedAtServer;
  const headerLine = race.event ? escHtml((race.age||'') + ' - ' + (race.gender||'') + ' - ' + (race.event||'')) : '<span class="muted">No race armed</span>';

  let leaderLane = null, leaderMs = Infinity;
  for(let i=1;i<=LANE_COUNT;i++){
    const splits = (race.splits && race.splits[i]) || null;
    const m = laneMean(splits);
    if(m != null && m < leaderMs){ leaderMs = m; leaderLane = i; }
  }

  let grid = '';
  for(let i=1;i<=LANE_COUNT;i++){
    const lane = race.lanes && race.lanes[i];
    const splits = (race.splits && race.splits[i]) || {};
    const mean = laneMean(splits);
    const need = (TIMING_TIERS[race.tier]||{}).min || 1;
    const conf = confidenceFor(splits, need);
    const tmCls = mean!=null ? 'tm' : (started ? 'tm live' : 'tm pending');
    const tmTxt = mean!=null ? fmtSec(mean)+'s' : (started ? '...' : '-');
    const leader = i === leaderLane ? ' leader' : '';
    grid += '<div class="observer-lane' + leader + '"><div class="lane-n">' + i + '</div><div class="stu">' + escHtml((lane&&lane.name)||'-') + '</div><div class="' + tmCls + '">' + tmTxt + '</div><div><span class="conf ' + conf.cls + '" style="font-size:9px">' + escHtml(conf.label) + '</span></div></div>';
  }

  const state = race.state || 'idle';
  const stateCls = 'state-' + (state==='running'?'running':state==='armed'?'armed':'waiting');

  appEl.innerHTML =
    '<div class="nav-tabs">' +
      '<a href="./timing.html' + carnivalQs() + '">Timer</a>' +
      '<a href="?admin=1' + carnivalAmp() + '">Race Control</a>' +
      '<a href="?observer=1' + carnivalAmp() + '" class="active">Observer</a>' +
      '<a href="?join=1' + carnivalAmp() + '">Join Page</a>' +
    '</div>' +
    '<h1>' + headerLine + '</h1>' +
    '<div class="state-banner ' + stateCls + '" style="margin-bottom:10px">' + escHtml(state.toUpperCase()) + (started?' - <span id="obsClock" style="font-family:ui-monospace,monospace">0.00</span>':'') + '</div>' +
    '<div class="observer-grid">' + grid + '</div>' +
    '<div class="footer-note">' + escHtml(CARNIVAL_ID) + ' - join code ' + JOIN_CODE + '</div>';

  if(started){
    const tick = () => {
      const el = document.getElementById('obsClock');
      if(!el) return;
      el.textContent = fmtClock(serverNow() - race.startedAtServer);
      rafHandle = requestAnimationFrame(tick);
    };
    tick();
  }
}

// VIEW: JOIN PAGE (QR code + short code)
function renderJoin(){
  const base = location.origin + location.pathname;
  const qParam = CARNIVAL_ID !== DEFAULT_CARNIVAL ? ('?carnival=' + encodeURIComponent(CARNIVAL_ID)) : '';
  const joinUrl = base + qParam;

  appEl.innerHTML =
    '<div class="nav-tabs">' +
      '<a href="./timing.html' + qParam + '">Timer</a>' +
      '<a href="?admin=1' + carnivalAmp() + '">Race Control</a>' +
      '<a href="?observer=1' + carnivalAmp() + '">Observer</a>' +
      '<a href="?join=1' + carnivalAmp() + '" class="active">Join Page</a>' +
    '</div>' +
    '<h1>Join this carnival</h1>' +
    '<div class="muted" style="margin-bottom:14px">Show this screen to every parent/teacher who is timing. They scan, pick a lane, ready to go.</div>' +
    '<div class="card" style="text-align:center"><label style="text-align:left">Scan to join</label><div id="qrBox" style="background:#fff;padding:18px;border-radius:14px;display:inline-block;margin:6px auto 10px"></div><div class="muted" style="word-break:break-all;font-size:11px">' + escHtml(joinUrl) + '</div></div>' +
    '<div class="card" style="text-align:center"><label style="text-align:left">Or type this code</label><div class="join-code">' + JOIN_CODE + '</div><div class="muted">Carnival id: <strong style="color:#5EEAD4">' + escHtml(CARNIVAL_ID) + '</strong></div></div>' +
    '<div class="card"><label>How it works</label><div style="font-size:13px;line-height:1.6">1. Each timer opens this URL on their phone (scan QR or type it in).<br>2. They enter their name once - saved on their phone.<br>3. They pick the lane they are standing next to.<br>4. When you hit GO, all phones get a 3-2-1 countdown + haptic buzz.<br>5. They tap the big STOP button when their runner crosses.<br>6. You hit Publish - times flow straight into the scoring app.</div></div>' +
    '<div class="footer-note"><a class="link" href="./timing.html' + qParam + '">back to Timer</a></div>';

  try{
    if(typeof QRCode !== 'undefined' && QRCode.toCanvas){
      const canvas = document.createElement('canvas');
      document.getElementById('qrBox').appendChild(canvas);
      QRCode.toCanvas(canvas, joinUrl, {width:240, margin:1, color:{dark:'#0F172A', light:'#FFFFFF'}});
    } else {
      document.getElementById('qrBox').innerHTML = '<div style="color:#0F172A;padding:20px;font-size:12px">QR library unavailable - use the code below</div>';
    }
  }catch(e){
    document.getElementById('qrBox').innerHTML = '<div style="color:#0F172A;padding:20px;font-size:12px">QR render failed</div>';
  }
}

// SELF-TESTS (?test=1)
if(q.has('test')){
  const assert = (cond, label) => {
    if(!cond){ console.error('FAIL:', label); document.body.insertAdjacentHTML('beforeend','<div style="padding:10px;background:#991B1B;color:#fff">FAIL: '+label+'</div>'); }
    else console.log('PASS:', label);
  };
  assert(trimmedMean([]) === null, 'empty -> null');
  assert(Math.abs(trimmedMean([12000]) - 12000) < 0.01, 'single -> self');
  assert(Math.abs(trimmedMean([12000,12400]) - 12200) < 0.01, 'two -> plain mean');
  assert(Math.abs(trimmedMean([12000,12100,99000]) - 12100) < 0.01, 'three -> drop max/min');
  assert(Math.abs(trimmedMean([10,11,12,13,14]) - 12) < 0.01, 'five -> trimmed = 12');
  assert(trimmedMean([null,NaN,-5,0]) === null, 'all invalid -> null');
  const race = {
    age:'9 Yrs', gender:'Boys', event:'100m', tier:'division',
    lanes: {1:{name:'A',house:'GEM'}, 2:{name:'B',house:'REID'}, 3:{name:'C',house:'NELSON'}, 4:{name:'',house:''}},
    splits: {
      1: {t1:{name:'x',elapsedMs:12100}, t2:{name:'y',elapsedMs:12200}, t3:{name:'z',elapsedMs:99999}},
      2: {t1:{name:'x',elapsedMs:13500}, t2:{name:'y',elapsedMs:13700}},
      3: {t1:{name:'x',elapsedMs:11900}},
      4: {}
    }
  };
  const ranked = buildRankedFromRace(race);
  assert(ranked.length === 3, 'lane 4 dropped');
  assert(ranked[0].name === 'C', 'lane 3 is 1st');
  assert(Math.abs(ranked[1].result - 12.20) < 0.01, 'lane 1 trimmed = 12.20');
  assert(Math.abs(ranked[2].result - 13.60) < 0.01, 'lane 2 plain mean = 13.60');
  const floor = checkTierFloor(race);
  assert(!floor.ok, 'division floor flags');
  assert(floor.under.length === 1 && floor.under[0].lane === 3, 'lane 3 is the one under');
  assert(carnivalJoinCode('wps-athletics-2026') === carnivalJoinCode('wps-athletics-2026'), 'join code deterministic');
  assert(carnivalJoinCode('foo') !== carnivalJoinCode('bar'), 'different ids -> different codes');
  document.body.insertAdjacentHTML('afterbegin','<div style="padding:10px;background:#064E3B;color:#fff;font-weight:800">Self-tests done - check console.</div>');
}
</script>
